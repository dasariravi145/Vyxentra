server:
  port: 7149
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vyxentra_emergencydb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 600000

  spring:
    jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          jdbc:
            batch_size: 20
      show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: event:com.vehicle.common.events.BaseEvent
    consumer:
      group-id: emergency-dispatch-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.vehicle.common.events
        spring.json.type.mapping: event:com.vehicle.common.events.BaseEvent

# Redisson Configuration
redisson:
  single-server-config:
    address: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    connection-pool-size: 10
    connection-minimum-idle-size: 5

# Emergency Configuration
emergency:
  search:
    initial-radius-km: ${EMERGENCY_INITIAL_RADIUS:5}
    max-radius-km: ${EMERGENCY_MAX_RADIUS:50}
    radius-increment-km: ${EMERGENCY_RADIUS_INCREMENT:5}
    provider-timeout-seconds: ${PROVIDER_TIMEOUT:30}
    request-expiry-minutes: ${REQUEST_EXPIRY:15}
  multipliers:
    repair: ${REPAIR_MULTIPLIER:1.5}
    petrol: ${PETROL_MULTIPLIER:1.2}
  fuel:
    base-price-url: ${FUEL_PRICE_URL:https://api.fuelprice.gov.in/latest}
    cache-minutes: ${FUEL_PRICE_CACHE:60}

# Redis Geo Indices (from common-library)
redis:
  geo:
    bike-repair: ${REDIS_GEO_BIKE_REPAIR:bike:repair}
    car-repair: ${REDIS_GEO_CAR_REPAIR:car:repair}
    bike-fuel: ${REDIS_GEO_BIKE_FUEL:bike:fuel}
    car-fuel: ${REDIS_GEO_CAR_FUEL:car:fuel}
    providers: ${REDIS_GEO_PROVIDERS:providers:geo}

# Eureka Configuration
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:7145/eureka}
  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      providerService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      bookingService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      paymentService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
  retry:
    instances:
      providerService:
        max-attempts: 3
        wait-duration: 1000
      fuelPriceService:
        max-attempts: 2
        wait-duration: 500

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    com.vehicle.emergency: DEBUG
    org.redisson: INFO
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/emergency-dispatch.log
    max-size: 100MB
    max-history: 30