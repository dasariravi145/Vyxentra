server:
  port: 7147
  shutdown: graceful
  netty:
    connection-timeout: 2s
    idle-timeout: 30s

spring:
  application:
    name: api-gateway

  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:7146/config}"

  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  cloud:

    config:
      enabled: true
      uri: ${CONFIG_SERVER_URL:http://localhost:7146}
      username: ${CONFIG_SERVER_USERNAME:config-server}
      password: ${CONFIG_SERVER_PASSWORD:config-server@123}
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1

    gateway:
      server:
        webflux:

          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:

            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authService
                    fallbackUri: forward:/fallback/auth
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1

            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: userService
                    fallbackUri: forward:/fallback/users
                - AuthenticationFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40

            - id: provider-service
              uri: lb://provider-service
              predicates:
                - Path=/api/v1/providers/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: providerService
                    fallbackUri: forward:/fallback/providers
                - AuthenticationFilter
                - SuspendedProviderFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60

            - id: employee-service
              uri: lb://employee-service
              predicates:
                - Path=/api/v1/employees/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: employeeService
                    fallbackUri: forward:/fallback/employees
                - AuthenticationFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60

            - id: service-catalog-service
              uri: lb://service-catalog-service
              predicates:
                - Path=/api/v1/catalog/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: catalogService
                    fallbackUri: forward:/fallback/catalog
                - AuthenticationFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 50
                    redis-rate-limiter.burstCapacity: 100

            - id: booking-service
              uri: lb://booking-service
              predicates:
                - Path=/api/v1/bookings/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: bookingService
                    fallbackUri: forward:/fallback/bookings
                - AuthenticationFilter
                - SuspendedProviderFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 40
                    redis-rate-limiter.burstCapacity: 80

            - id: emergency-service
              uri: lb://emergency-dispatch-service
              predicates:
                - Path=/api/v1/emergency/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: emergencyService
                    fallbackUri: forward:/fallback/emergency
                - AuthenticationFilter
                - SuspendedProviderFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40

            - id: tracking-service
              uri: lb://tracking-service
              predicates:
                - Path=/api/v1/tracking/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: trackingService
                    fallbackUri: forward:/fallback/tracking
                - AuthenticationFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 100
                    redis-rate-limiter.burstCapacity: 200

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: paymentService
                    fallbackUri: forward:/fallback/payments
                - AuthenticationFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 30
                    redis-rate-limiter.burstCapacity: 60

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: notificationService
                    fallbackUri: forward:/fallback/notifications
                - AuthenticationFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 50
                    redis-rate-limiter.burstCapacity: 100

            - id: admin-service
              uri: lb://admin-service
              predicates:
                - Path=/api/v1/admin/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: adminService
                    fallbackUri: forward:/fallback/admin
                - AuthenticationFilter
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40

          spring:
            cloud:
              gateway:
                default-filters:
                  - name: Retry
                    args:
                      retries: 3
                      statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                      methods: GET
                      backoff:
                        firstBackoff: 100ms
                        maxBackoff: 500ms
                        factor: 2

                  - name: CorrelationIdFilter
                  - name: LoggingFilter

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:7145/eureka}
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 10

  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

resilience4j:
  circuitbreaker:
    instances:
      authService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      userService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      providerService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      bookingService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      emergencyService:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
      base-path: /actuator

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

  prometheus:
    metrics:
      export:
        enabled: true
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.vyxentra.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.data.redis: INFO
    org.springframework.security: INFO

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/api-gateway.log

  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30