spring:
  cloud:
    config:
      enabled: true
      uri: ${CONFIG_SERVER_URL:http://localhost:7146/config}
      username: ${CONFIG_SERVER_USERNAME:config-server}
      password: ${CONFIG_SERVER_PASSWORD:config-server@123}
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}