server:
  port: 7153
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vyxentra_trackingdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 600000

  spring:
    jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          jdbc:
            batch_size: 20
      show-sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: tracking-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.vehicle.common.events
        spring.json.type.mapping: event:com.vehicle.common.events.BaseEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# WebSocket Configuration
websocket:
  endpoint: /ws/tracking
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  heartbeat-interval: 30000
  location-update-interval: 5000

# Tracking Configuration
tracking:
  location:
    history-retention-days: ${LOCATION_HISTORY_RETENTION:7}
    update-threshold-meters: ${LOCATION_UPDATE_THRESHOLD:10}
    max-updates-per-minute: ${MAX_UPDATES_PER_MINUTE:60}
  eta:
    update-interval-seconds: ${ETA_UPDATE_INTERVAL:30}
    traffic-enabled: ${TRAFFIC_ENABLED:false}
  session:
    expiry-minutes: ${TRACKING_SESSION_EXPIRY:120}
    max-concurrent-sessions: ${MAX_CONCURRENT_SESSIONS:5}

# Eureka Configuration
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:7145/eureka}
  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      bookingService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      providerService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
  retry:
    instances:
      bookingService:
        max-attempts: 3
        wait-duration: 1000

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    com.vehicle.tracking: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/tracking-service.log
    max-size: 100MB
    max-history: 30