spring:
  cloud:
    config:
      enabled: true
      uri: ${CONFIG_SERVER_URL:http://localhost:8888/config}
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}