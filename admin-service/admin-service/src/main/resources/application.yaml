server:
  port: 7157
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vyxentra_adminservice}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migra

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# Admin Configuration
admin:
  audit:
    retention-days: ${AUDIT_RETENTION_DAYS:90}
    log-user-actions: ${LOG_USER_ACTIONS:true}
  dashboard:
    cache-minutes: ${DASHBOARD_CACHE_MINUTES:5}
    refresh-interval: ${DASHBOARD_REFRESH_INTERVAL:300000}
  reports:
    max-export-rows: ${REPORT_MAX_EXPORT_ROWS:10000}
    default-format: ${REPORT_DEFAULT_FORMAT:excel}

# Eureka Configuration
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:7145/eureka}
  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: true

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      userService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      providerService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      bookingService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      paymentService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  circuitbreaker:
    enabled: true

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    com.vehicle.admin: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/admin-service.log
    max-size: 100MB
    max-history: 30