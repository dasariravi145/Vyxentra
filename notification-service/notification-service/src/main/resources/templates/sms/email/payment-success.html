<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background-color: #2196F3; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background-color: #f9f9f9; }
        .payment-details { background-color: white; padding: 15px; border-radius: 5px; margin: 20px 0; }
        .amount { font-size: 24px; font-weight: bold; color: #4CAF50; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Payment Successful!</h1>
    </div>
    <div class="content">
        <p>Dear Customer,</p>
        <p>Your payment has been processed successfully.</p>

        <div class="payment-details">
            <p><strong>Booking ID:</strong> <span th:text="${bookingId}">BOK123456</span></p>
            <p><strong>Payment ID:</strong> <span th:text="${paymentId}">PAY123456</span></p>
            <p><strong>Amount Paid:</strong> <span class="amount" th:text="${amount}">₹5,000.00</span></p>
            <p><strong>Date:</strong> <span th:text="${#dates.format(#dates.createNow(), 'dd MMM yyyy HH:mm')}">Jan 20, 2024 10:30 AM</span></p>
        </div>

        <p>A receipt has been attached to this email for your records.</p>
    </div>
    <div class="footer">
        <p>Thank you for using Vehicle Service Platform!</p>
    </div>
</div>
</body>
</html>
